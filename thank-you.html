<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | JM Trade Advisory & Consulting</title>
    <meta name="description" content="Your message has been sent successfully. We'll get back to you within 24 hours.">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Additional thank-you specific styles (matching your theme) -->
    <style>
        /* Full-height thank you section - matches your glass morphism */
        .thankyou-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        
        .thankyou-section::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08), transparent 70%);
            top: -200px;
            left: -200px;
            z-index: 0;
            pointer-events: none;
        }
        
        .thankyou-section::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05), transparent 70%);
            bottom: -200px;
            right: -200px;
            z-index: 0;
            pointer-events: none;
        }
        
        .thankyou-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.6s ease-out;
            transition: var(--transition-base);
        }
        
        .thankyou-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-light);
            box-shadow: var(--shadow-lg);
        }
        
        .checkmark-circle {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }
        
        .checkmark-circle svg {
            width: 45px;
            height: 45px;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .thankyou-card h1 {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        
        .thankyou-card p {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .thankyou-card strong {
            color: var(--text-light);
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-base);
        }
        
        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-base);
        }
        
        .btn-back:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            transform: translateY(-3px);
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .thankyou-card {
                padding: 2rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn-whatsapp,
            .btn-back {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="thankyou-section">
        <div class="thankyou-card">
            <div class="checkmark-circle">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
            <h1>Message Sent!</h1>
            <p>Thank you for reaching out to <strong>JM Trade Advisory & Consulting</strong>.</p>
            <p>I'll review your message and get back to you within <strong style="color: var(--accent);">24 hours</strong>.</p>
            <p>For urgent matters, reach out on WhatsApp:</p>
            <div class="btn-group">
                <a href="https://wa.me/243816099433" class="btn-whatsapp" target="_blank">
                    WhatsApp (DRC)
                </a>
                <a href="https://wa.me/61480510372" class="btn-whatsapp" target="_blank" style="background: linear-gradient(135deg, #128C7E, #075E54);">
                    WhatsApp (AUS)
                </a>
            </div>
            <div style="margin-top: 1.5rem;">
                <a href="index.html" class="btn-back">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
