<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | JM Trade Advisory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a2f44 0%, #1b5a6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .thankyou-card {
            background: white;
            max-width: 500px;
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease-out;
        }
        
        .checkmark {
            width: 80px;
            height: 80px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
            color: white;
        }
        
        h1 {
            color: #0a2f44;
            margin-bottom: 1rem;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .btn {
            display: inline-block;
            background: #f4c542;
            color: #0a2f44;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(244, 197, 66, 0.3);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .whatsapp {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 1rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="thankyou-card">
        <div class="checkmark">✓</div>
        <h1>Message Sent!</h1>
        <p>Thank you for reaching out to JM Trade Advisory & Consulting.</p>
        <p>I'll review your message and get back to you within <strong>24 hours</strong>.</p>
        <p>For urgent matters, reach out on WhatsApp:</p>
        <div>
            <a href="https://wa.me/243816099433" class="whatsapp" target="_blank">💬 WhatsApp Me</a>
        </div>
        <a href="index.html" class="btn">← Back to Home</a>
    </div>
</body>
</html>
